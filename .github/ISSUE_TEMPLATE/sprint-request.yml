name: Small GitHub PR Sprint request
description: Request a small public GitHub docs/test/example/bug-fix sprint
title: "Sprint request: "
labels: ["sprint-request"]

body:
  - type: markdown
    attributes:
      value: |
        Request a focused public-repo fix delivered as a pull request or patch file.

        Please do not send payment before the request is reviewed, accepted, and priced.

  - type: input
    id: repo
    attributes:
      label: Public repository URL
      placeholder: https://github.com/owner/repo
    validations:
      required: true

  - type: input
    id: issue
    attributes:
      label: Issue URL or context
      description: Link the GitHub issue if one exists. Otherwise describe the exact problem.
      placeholder: https://github.com/owner/repo/issues/123
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
      placeholder: |
        Example:
        The documented install command should work on a fresh clone.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happens now?
      placeholder: |
        Example:
        The README says to run npm run start, but the actual script is npm run dev.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true for this sprint to be considered complete?
      placeholder: |
        - README install command is corrected
        - Example command works as documented
        - PR references the linked issue
    validations:
      required: true

  - type: input
    id: verification
    attributes:
      label: Test command / verification path
      description: If known, provide the command or manual check that confirms the fix.
      placeholder: npm test / pytest / cargo test / manual docs check / unknown

  - type: dropdown
    id: tier
    attributes:
      label: Requested pricing tier
      options:
        - $10 docs/link/example sprint
        - $25 tiny test/bug sprint
        - $50+ bounded bug sprint
        - Unsure / please price after review
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - No rush
        - 72 hours
        - 48 hours
        - 24 hours
        - Urgent / please confirm availability
    validations:
      required: true

  - type: dropdown
    id: delivery
    attributes:
      label: Delivery accepted
      options:
        - External PR accepted
        - Patch file accepted
        - Either PR or patch file is OK
    validations:
      required: true

  - type: checkboxes
    id: exclusions
    attributes:
      label: Scope confirmation
      options:
        - label: This is a public repository.
          required: true
        - label: This task does not require private credentials, private repo access, private APIs, or production access.
          required: true
        - label: This task does not involve auth, payments, wallets, security exploit work, scraping abuse, spam, or ToS-risk activity.
          required: true
        - label: This is a bounded docs/test/example/small-bug request, not a vague refactor.
          required: true
